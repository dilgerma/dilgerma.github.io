<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>

    <!-- Meta Description -->
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">

    <!-- Keywords -->
    {% if page.keywords %}
    <meta name="keywords" content="{{ page.keywords }}">
    {% endif %}

    <!-- Author -->
    <meta name="author" content="{% if page.author %}{{ page.author }}{% else %}Martin Dilger{% endif %}">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ site.url }}{{ page.url }}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% if page.featured_image %}
    <meta property="og:image" content="{{ site.url }}{{ page.featured_image | relative_url }}">
    {% endif %}
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ site.url }}{{ page.url }}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% if page.featured_image %}
    <meta name="twitter:image" content="{{ site.url }}{{ page.featured_image | relative_url }}">
    {% endif %}

    <!-- Structured Data - JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}",
      "description": "{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}",
      "url": "{{ site.url }}{{ page.url }}",
      "isPartOf": {
        "@type": "WebSite",
        "name": "{{ site.title }}",
        "url": "{{ site.url }}"
      }
    }
    </script>

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</head>
<body>
    {% include header.html %}

    {{ content }}

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 Nebulit GmbH</p>
            <nav class="footer-nav">
                <a href="{{ '/impressum' | relative_url }}">Impressum</a>
                <a href="{{ '/datenschutz' | relative_url }}">Datenschutz</a>
            </nav>
            <p class="footer-offered-by">offered with ❤️ by Nebulit</p>
        </div>
    </footer>
</body>
</html>
